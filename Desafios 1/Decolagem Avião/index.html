<!DOCTYPE html>
<html lang="pt-br">
<head>

        body {
            background-color: #131313;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: left;
            width: 100%;
            max-width: 450px;
        }

        h1 { text-align: center; color: #ed145b; font-size: 1.5rem; }

        label { display: block; margin-top: 10px; font-size: 0.9rem; color: #bbb; }

        input[type="number"] {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: 2px solid #333;
            background: #000;
            color: #fff;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            background: #252525;
            padding: 10px;
            border-radius: 5px;
        }

        .checkbox-group input { width: auto; margin: 0; }

        button {
            background-color: #ed145b;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background-color: #ff2d70; transform: scale(1.02); }

        #resultado-logica {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            border: 2px solid transparent;
            min-height: 50px;
        }
    </style>
</head>

</html>
